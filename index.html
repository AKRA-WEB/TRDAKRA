<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบเบิกจ่ายสินค้า W1-W2</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Custom Styles & Animations */
        body { 
            font-family: 'Sarabun', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            background-color: #f8fafc; /* slate-50 */
            color: #1e293b; /* slate-800 */
        }
        .animate-fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Hide scrollbar for cleaner look */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* Loading Overlay */
        #loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(4px);
            z-index: 9999;
            align-items: center; justify-content: center; flex-direction: column;
        }
        
        /* Smooth transitions for inputs */
        input { transition: all 0.2s ease-in-out; }
    </style>
</head>
<body class="bg-[#f8fafc]">

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="flex">
        <div class="animate-spin rounded-full h-10 w-10 border-[3px] border-blue-100 border-t-blue-600 mb-4"></div>
        <p class="text-blue-600 font-medium text-sm tracking-wide" id="loading-text">กำลังโหลดข้อมูล...</p>
    </div>

    <div id="app-root" class="min-h-screen flex justify-center">
        <!-- Content will be injected here by JavaScript -->
    </div>

    <script>
        // ==========================================
        // 0. AUTHENTICATION & LOG SYSTEM (จากหน้า Main)
        // ==========================================
        // 1. ตั้งค่าชื่อแอปพลิเคชันนี้
        const CURRENT_APP_NAME = "TRDAKRA"; 
        
        // URL ของ Google Apps Script (ตัวเดียวกับหน้า Main สำหรับบันทึก Log)
        const GOOGLE_APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw5PCJ1OlxCQR6zaNubrmZTgaORB-rJK2Ow5_YC3i5kKv-BrrTgJkTJyNZKrzfodK1m/exec";

        // 2. ดึงชื่อผู้ใช้จาก URL (ที่หน้า Main ส่งมาให้)
        const urlParams = new URLSearchParams(window.location.search);
        let currentUser = urlParams.get('user');

        if (currentUser) {
            // ถ้ามีชื่อส่งมา ให้จำค่าไว้ใน sessionStorage (เผื่อผู้ใช้กด Refresh หน้าเว็บ จะได้ไม่หลุด)
            sessionStorage.setItem('active_user', currentUser);
            
            // ลบ ?user=... ออกจาก URL เพื่อให้ URL ดูสะอาดตา (Optional)
            try {
                window.history.replaceState({}, document.title, window.location.pathname);
            } catch(e) {
                // ป้องกัน Error เวลาแก้ไข URL ในโหมด Preview
            }
        } else {
            // ถ้าไม่มีใน URL ให้ลองหาในสิ่งที่จำไว้
            currentUser = sessionStorage.getItem('active_user');
        }

        // 3. ระบบรักษาความปลอดภัย: ถ้าไม่มีชื่อผู้ใช้เลย แปลว่าแอบเข้าลิงก์ตรงๆ ไม่ผ่านหน้า Main
        if (!currentUser) {
            // ดักจับ: หากเปิดในหน้าต่าง Preview ให้สร้างชื่อจำลองอัตโนมัติ เพื่อให้ดูแอปได้เลย
            if (window.self !== window.top || window.location.hostname.includes('usercontent')) {
                currentUser = "พนักงาน (Preview)";
            } else {
                alert("กรุณาเข้าสู่ระบบผ่านหน้า Main ก่อนใช้งานครับ");
                // เด้งกลับไปหน้า Main ทันที
                try {
                    window.location.href = "https://akra-web.github.io/Main/"; 
                } catch(e) {}
            }
        } 
        
        if (currentUser) {
            console.log("ยินดีต้อนรับคุณ: " + currentUser);
        }

        // 4. ฟังก์ชันสำหรับบันทึก Log การทำงานในแอปนี้
        function sendAppLog(action, details) {
            const payload = {
                user: currentUser,
                action: action,
                app: CURRENT_APP_NAME,
                details: details
            };

            fetch(GOOGLE_APP_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(() => {
                console.log(`บันทึก Log สำเร็จ: ${action} โดย ${currentUser}`);
            }).catch(err => console.error(err));
        }

        // ==========================================
        // 1. CONFIGURATION & STATE (ระบบเบิกจ่าย)
        // ==========================================
        // URL ของ Web App สำหรับดึงและบันทึกข้อมูลเบิกจ่าย
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby_VL9BXR4JOPvrvWtEoKWyM_FlN5SeNdiZhYpUoeAcC7K2_aSzDJ4RlxPgd-e8RpP4Aw/exec';

        let state = {
            view: 'home', // 'home', 'w1', 'w2'
            w1Tab: 'request', // 'request', 'pending', 'history'
            w2Tab: 'tasks', // 'tasks', 'history'
            selectedReceiveId: null, 
            items: [], // รายการเบิกสินค้า
            products: [] // รายชื่อสินค้าจากชีต Product
        };

        function showLoading(text = 'กำลังทำงาน...') {
            document.getElementById('loading-text').innerText = text;
            document.getElementById('loading-overlay').style.display = 'flex';
        }

        function hideLoading() {
            document.getElementById('loading-overlay').style.display = 'none';
        }

        // ==========================================
        // 2. API FUNCTIONS (FETCH)
        // ==========================================
        function formatDateTime(dateStr) {
            if (!dateStr) return '-';
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) return dateStr;

            const optionsDate = { timeZone: 'Asia/Bangkok', day: '2-digit', month: '2-digit', year: 'numeric' };
            const optionsTime = { timeZone: 'Asia/Bangkok', hour: '2-digit', minute: '2-digit', hour12: false };
            
            let datePart = d.toLocaleDateString('th-TH', optionsDate).replace(/\//g, '-'); 
            let timePart = d.toLocaleTimeString('th-TH', optionsTime);

            return `${datePart} / ${timePart} น.`;
        }

        // ฟังก์ชันแปลงวันที่ที่ผู้ใช้พิมพ์ (พ.ศ.) ให้กลายเป็น ค.ศ. ก่อนส่งไปหลังบ้าน
        function convertToCE(dateStr) {
            if (!dateStr) return dateStr;
            const regex = /^(\d{1,2})[-/](\d{1,2})[-/](\d{4})$/;
            const match = dateStr.trim().match(regex);
            if (match) {
                let day = match[1].padStart(2, '0');
                let month = match[2].padStart(2, '0');
                let year = parseInt(match[3], 10);

                if (year > 2500) { 
                    year -= 543;
                }
                return `${day}-${month}-${year}`; 
            }
            return dateStr; 
        }

        // ฟังก์ชันป้องกันกรณี Google Sheet แอบแปลงวันที่เป็นรูปแบบสากล (ISO) ให้ออกมาเป็น วัน-เดือน-ปี ตามเดิม
        function formatExpiryDate(val) {
            if (!val || val === 'ไม่ได้ระบุ') return val;
            
            if (typeof val === 'string' && val.match(/^\d{4}-\d{2}-\d{2}T/)) {
                const d = new Date(val);
                if (!isNaN(d.getTime())) {
                    const day = String(d.getDate()).padStart(2, '0');
                    const month = String(d.getMonth() + 1).padStart(2, '0');
                    const year = d.getFullYear() + 543; 
                    return `${day}-${month}-${year}`;
                }
            }
            
            if (typeof val === 'string') {
                const regex = /^(\d{1,2})[-/](\d{1,2})[-/](\d{4})$/;
                const match = val.trim().match(regex);
                if (match) {
                    let day = match[1].padStart(2, '0');
                    let month = match[2].padStart(2, '0');
                    let year = parseInt(match[3], 10);
                    if (year > 1900 && year < 2500) { 
                        year += 543;
                    }
                    return `${day}-${month}-${year}`;
                }
            }
            
            return val;
        }

        async function fetchInitialData() {
            if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL === 'https://script.google.com/macros/s/AKfycbw-oW1j7jB2oCQLRZ3_k-OKtVKk4xVQHQNlZaZn9IBzHYHlzYONmRaLaj0YD5gZhTz9/exec') {
                hideLoading();
                alert('คำเตือน: กรุณาใส่ APPS_SCRIPT_URL ในไฟล์ HTML ก่อนใช้งานจริง');
                return;
            }

            try {
                const itemsResponse = await fetch(`${APPS_SCRIPT_URL}?action=getItems`);
                const itemsData = await itemsResponse.json();
                
                state.items = (itemsData || []).map(item => ({
                    ...item,
                    timestamp: formatDateTime(item.timestamp),
                    oldExpiry: formatExpiryDate(item.oldExpiry),
                    newExpiry: formatExpiryDate(item.newExpiry)
                }));

                const productsResponse = await fetch(`${APPS_SCRIPT_URL}?action=getProducts`);
                const productsData = await productsResponse.json();
                
                if (Array.isArray(productsData)) {
                    state.products = productsData.map(p => {
                        if (typeof p === 'object' && p !== null) {
                            return p.itemName || p.name || p[0] || p[1] || '';
                        }
                        return String(p).trim();
                    }).filter(p => p !== '');
                } else {
                    state.products = [];
                }

                render();
            } catch (error) {
                console.error('Error fetching data:', error);
                alert('ไม่สามารถเชื่อมต่อกับฐานข้อมูลได้ กรุณาลองใหม่อีกครั้ง');
            } finally {
                hideLoading();
            }
        }

        async function syncDataToSheet() {
            if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL === 'https://script.google.com/macros/s/AKfycbx3wED0Kurg2OhIXcflXwAxHz5_BAMmICk3I6Q43S-wzU5gNznafymrQj9mNbYH6AnA/exec') return;

            showLoading('กำลังบันทึกข้อมูล...');
            try {
                await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(state.items)
                });
            } catch (error) {
                console.error('Error saving data:', error);
                alert('เกิดข้อผิดพลาดในการบันทึกข้อมูล');
            } finally {
                hideLoading();
            }
        }

        // ==========================================
        // 3. AUTOCOMPLETE SEARCH LOGIC
        // ==========================================
        function filterProducts(query) {
            const listDiv = document.getElementById('autocomplete-list');
            if (!listDiv) return;

            const q = query.toLowerCase().trim();
            let filtered = [];
            
            if (!q) {
                filtered = state.products.slice(0, 50);
            } else {
                filtered = state.products.filter(p => p.toLowerCase().includes(q)).slice(0, 50);
            }

            if (filtered.length === 0) {
                if (state.products.length === 0) {
                    listDiv.innerHTML = `
                        <div class="p-5 text-center">
                            <span class="material-icons-round text-rose-300 text-3xl mb-2">error_outline</span>
                            <p class="text-sm font-semibold text-rose-500">ไม่พบฐานข้อมูลสินค้า</p>
                            <p class="text-xs text-slate-400 mt-1">กรุณาตรวจสอบการเชื่อมต่อ</p>
                        </div>`;
                } else {
                    listDiv.innerHTML = `<div class="p-4 text-sm text-slate-400 text-center">ไม่พบสินค้าที่ค้นหา</div>`;
                }
            } else {
                listDiv.innerHTML = filtered.map(p => `
                    <div onclick="selectProduct(decodeURIComponent('${encodeURIComponent(p)}'))" 
                         class="px-4 py-3 hover:bg-blue-50 hover:text-blue-700 cursor-pointer border-b border-slate-50 text-sm text-slate-700 last:border-0 truncate flex items-center gap-3 transition-colors">
                        <span class="material-icons-round text-blue-300 text-[18px]">inventory_2</span> ${p}
                    </div>
                `).join('');
            }
            listDiv.classList.remove('hidden');
        }

        function selectProduct(name) {
            const input = document.getElementById('w1-itemName');
            if (input) {
                input.value = name;
            }
            document.getElementById('autocomplete-list').classList.add('hidden');
        }

        // ==========================================
        // 4. ACTION HANDLERS
        // ==========================================
        function setView(viewName) {
            state.view = viewName;
            state.selectedReceiveId = null;
            render();
        }

        function setW1Tab(tabName) {
            state.w1Tab = tabName;
            state.selectedReceiveId = null;
            render();
        }

        function setW2Tab(tabName) {
            state.w2Tab = tabName;
            render();
        }

        async function handleW1Submit(event) {
            event.preventDefault();
            const itemName = document.getElementById('w1-itemName').value;
            const qty = document.getElementById('w1-qty').value;
            const oldExpiryInput = document.getElementById('w1-oldExpiry').value;

            if (!itemName || !qty) return;

            const newItem = {
                id: `REQ-${Math.floor(Math.random() * 9000) + 1000}`,
                timestamp: formatDateTime(new Date().toISOString()),
                itemName: itemName,
                requestQty: parseInt(qty),
                status: 'สั่งเบิก',
                oldExpiry: oldExpiryInput ? convertToCE(oldExpiryInput) : 'ไม่ได้ระบุ',
                newExpiry: '',
                receiveQty: null,
                receiveNote: '',
                w2Note: '' 
            };

            state.items.unshift(newItem); 
            state.w1Tab = 'pending'; 
            render(); 
            
            await syncDataToSheet(); 
            alert('ส่งคำขอเบิกสินค้าเรียบร้อยแล้ว!');
            
            // ส่ง Log การทำรายการ
            sendAppLog("สั่งเบิกสินค้า", `เบิก: ${itemName} จำนวน ${qty} ชิ้น`);
        }

        function openReceiveForm(id) {
            state.selectedReceiveId = id;
            render();
        }

        async function handleReceiveSubmit(event, id, reqQty) {
            event.preventDefault();
            const receiveQty = parseInt(document.getElementById(`recv-qty-${id}`).value);
            const newExpiryInput = document.getElementById(`recv-exp-${id}`).value;
            
            const newExpiry = newExpiryInput ? convertToCE(newExpiryInput) : 'ไม่ได้ระบุ';

            let note = 'ครบ';
            if (receiveQty < reqQty) note = `ขาด ${reqQty - receiveQty}`;
            if (receiveQty > reqQty) note = `เกิน ${receiveQty - reqQty}`;

            let receivedItemName = "";

            state.items = state.items.map(item => {
                if (item.id === id) {
                    receivedItemName = item.itemName;
                    return { ...item, status: 'รับสินค้าแล้ว', receiveQty: receiveQty, receiveNote: note, newExpiry: newExpiry };
                }
                return item;
            });

            state.selectedReceiveId = null;
            render();
            await syncDataToSheet();
            
            // ส่ง Log การรับสินค้า
            sendAppLog("รับสินค้า", `รับ: ${receivedItemName} ยอดจริง ${receiveQty} (${note})`);
        }

        async function updateItemStatus(id, newStatus) {
            const noteInput = document.getElementById(`w2-note-${id}`);
            const w2NoteValue = noteInput ? noteInput.value : '';
            let targetItemName = "";

            state.items = state.items.map(item => {
                if (item.id === id) {
                    targetItemName = item.itemName;
                    return { ...item, status: newStatus, w2Note: w2NoteValue || item.w2Note };
                }
                return item;
            });
            render();
            await syncDataToSheet();
            
            // ส่ง Log การอัปเดตสถานะของคลัง
            sendAppLog("เปลี่ยนสถานะคลัง", `สถานะ: ${newStatus} (${targetItemName}) หมายเหตุ: ${w2NoteValue}`);
        }

        // ==========================================
        // 5. UI RENDERING LOGIC (Colorful Minimalist)
        // ==========================================
        function getStatusBadge(status) {
            const styles = {
                'สั่งเบิก': 'bg-blue-50 text-blue-700 border-blue-200/60',
                'กำลังจัดสินค้า': 'bg-indigo-600 text-white shadow-sm shadow-indigo-600/30',
                'รอรับสินค้า': 'bg-orange-50 text-orange-600 border-orange-200/60 animate-pulse',
                'รับสินค้าแล้ว': 'bg-emerald-50 text-emerald-700 border-emerald-200/60',
                'สินค้าหมด': 'bg-rose-50 text-rose-700 border-rose-200/60',
                'ยกเลิกรายการ': 'bg-slate-50 text-slate-400 border-slate-200'
            };
            return `<span class="px-2.5 py-1 rounded-full text-[10px] font-bold tracking-wide uppercase border ${styles[status] || 'bg-slate-100'}">${status}</span>`;
        }

        function renderEmptyState(message, iconName) {
            return `
                <div class="flex flex-col items-center justify-center py-16 text-slate-400">
                    <div class="bg-white p-4 rounded-full shadow-sm mb-3 text-slate-300">
                        <span class="material-icons-round" style="font-size: 40px;">${iconName}</span>
                    </div>
                    <p class="text-sm font-medium tracking-wide">${message}</p>
                </div>
            `;
        }

        function renderHistoryList(role) {
            const historyItems = state.items.filter(i => ['รับสินค้าแล้ว', 'สินค้าหมด', 'ยกเลิกรายการ'].includes(i.status));
            if (historyItems.length === 0) return renderEmptyState('ไม่มีประวัติย้อนหลัง', 'history_toggle_off');

            return `
                <div class="space-y-4">
                    ${historyItems.map(item => `
                        <div class="bg-white p-5 rounded-[1.5rem] shadow-[0_4px_16px_rgb(0,0,0,0.03)] border border-slate-100 opacity-95 hover:opacity-100 transition-opacity">
                            <div class="flex justify-between items-start mb-3">
                                <div class="pr-2">
                                    <h3 class="font-bold text-slate-800 text-[15px] leading-tight">${item.itemName}</h3>
                                    <p class="text-[10px] text-slate-400 font-mono tracking-wider mt-1">ID: ${item.id}</p>
                                </div>
                                <div class="flex-shrink-0">${getStatusBadge(item.status)}</div>
                            </div>
                            
                            <div class="flex justify-between items-end border-t border-slate-50 pt-3 mt-1">
                                <div class="text-xs text-slate-500 space-y-1">
                                    <p class="text-[10px] text-slate-400 flex items-center gap-1"><span class="material-icons-round text-[12px]">schedule</span> ${item.timestamp}</p>
                                    ${item.status === 'รับสินค้าแล้ว' ? `
                                        <p class="mt-1">เบิก <span class="font-medium text-slate-700">${item.requestQty}</span> • รับจริง <span class="font-medium text-emerald-600">${item.receiveQty}</span></p>
                                        ${role === 'w1' ? `<p class="text-[11px] text-blue-500 font-medium">EXP ใหม่: ${item.newExpiry}</p>` : ''}
                                    ` : ''}
                                </div>
                                
                                ${item.status === 'รับสินค้าแล้ว' && item.receiveNote && item.receiveNote !== 'ครบ' ? `
                                    <div class="text-[10px] font-medium text-rose-500 bg-rose-50 px-2 py-0.5 rounded-md border border-rose-100/50">ได้${item.receiveNote}</div>
                                ` : ''}
                            </div>
                            ${item.w2Note ? `<p class="text-[11px] mt-3 text-amber-700 bg-amber-50 px-3 py-2 rounded-xl border border-amber-100/50"><span class="font-bold">โน้ต:</span> ${item.w2Note}</p>` : ''}
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // --- Render Screens ---
        function renderHome() {
            return `
                <div class="w-full max-w-sm flex flex-col items-center justify-center p-5 relative min-h-screen">
                    <div class="absolute top-6 right-6 bg-white/90 backdrop-blur-md px-3.5 py-1.5 rounded-full shadow-sm border border-slate-100 flex items-center gap-1.5 text-xs font-semibold text-blue-600 z-10 tracking-wide">
                        <div class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></div>
                        ${currentUser}
                    </div>

                    <div class="bg-white p-10 rounded-[2.5rem] shadow-[0_8px_30px_rgb(0,0,0,0.06)] w-full text-center border border-slate-50 mt-10">
                        <div class="w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6 bg-blue-50 text-blue-600 shadow-inner">
                            <span class="material-icons-round" style="font-size: 36px;">inventory_2</span>
                        </div>
                        <h1 class="text-2xl font-bold text-slate-800 mb-2">ระบบเบิกจ่ายสินค้า</h1>
                        <p class="text-slate-400 mb-10 text-xs tracking-wide">เลือกระบบที่คุณต้องการเข้าใช้งาน</p>
                        
                        <div class="space-y-4">
                            <button onclick="setView('w1')" class="w-full bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-2xl font-medium flex items-center justify-center gap-3 transition-all shadow-[0_6px_20px_rgba(37,99,235,0.25)] active:scale-[0.98]">
                                <span class="material-icons-round text-blue-200">storefront</span> พนักงานหน้าร้าน (W1)
                            </button>
                            
                            <button onclick="setView('w2')" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white p-4 rounded-2xl font-medium flex items-center justify-center gap-3 transition-all shadow-[0_6px_20px_rgba(79,70,229,0.25)] active:scale-[0.98]">
                                <span class="material-icons-round text-indigo-200">warehouse</span> พนักงานคลังสินค้า (W2)
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderW1() {
            const hasPending = state.items.some(i => i.status === 'รอรับสินค้า');
            
            let content = '';
            if (state.w1Tab === 'request') {
                content = `
                    <form onsubmit="handleW1Submit(event)" class="bg-white p-6 rounded-[2rem] shadow-[0_4px_24px_rgb(0,0,0,0.03)] border border-slate-50 space-y-5 animate-fade-in">
                        <h2 class="text-lg font-bold text-slate-800 flex items-center gap-2 mb-6">
                            <div class="bg-blue-50 text-blue-600 p-1.5 rounded-full flex items-center justify-center">
                                <span class="material-icons-round text-[20px]">add</span>
                            </div>
                            สร้างรายการเบิก
                        </h2>
                        
                        <div>
                            <label class="block text-[11px] font-semibold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">ชื่อรายการสินค้า <span class="text-rose-500">*</span></label>
                            <div class="relative">
                                <input type="text" id="w1-itemName" autocomplete="off" required 
                                    oninput="filterProducts(this.value)"
                                    onfocus="filterProducts(this.value)"
                                    onblur="setTimeout(() => { const el = document.getElementById('autocomplete-list'); if(el) el.classList.add('hidden'); }, 200)"
                                    class="w-full p-4 bg-slate-50 border border-transparent rounded-2xl focus:bg-white focus:border-blue-400 focus:ring-4 focus:ring-blue-50 transition-all text-sm text-slate-800 placeholder:text-slate-400" 
                                    placeholder="ค้นหาหรือพิมพ์ชื่อสินค้า...">
                                
                                <div id="autocomplete-list" class="hidden absolute z-50 w-full mt-2 bg-white border border-slate-100 rounded-2xl shadow-xl max-h-60 overflow-y-auto custom-scrollbar">
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-[11px] font-semibold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">จำนวน <span class="text-rose-500">*</span></label>
                                <input type="number" id="w1-qty" required min="1" class="w-full p-4 bg-slate-50 border border-transparent rounded-2xl focus:bg-white focus:border-blue-400 focus:ring-4 focus:ring-blue-50 transition-all text-base font-semibold text-slate-900 placeholder:text-slate-300" placeholder="0">
                            </div>
                            <div>
                                <label class="block text-[11px] font-semibold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">หมดอายุเก่า</label>
                                <input type="text" id="w1-oldExpiry" class="w-full p-4 bg-slate-50 border border-transparent rounded-2xl focus:bg-white focus:border-blue-400 focus:ring-4 focus:ring-blue-50 transition-all text-sm text-slate-800 placeholder:text-slate-400" placeholder="วว-ดด-ปป">
                            </div>
                        </div>

                        <button type="submit" class="w-full bg-blue-600 text-white font-medium text-sm py-4 rounded-2xl mt-6 hover:bg-blue-700 transition-all active:scale-[0.98] shadow-[0_6px_20px_rgba(37,99,235,0.25)]">
                            ยืนยันการสั่งเบิก
                        </button>
                    </form>
                `;
            } else if (state.w1Tab === 'pending') {
                const pendingItems = state.items.filter(i => ['สั่งเบิก', 'กำลังจัดสินค้า', 'รอรับสินค้า'].includes(i.status));
                if (pendingItems.length === 0) {
                    content = renderEmptyState('ไม่มีรายการรอรับ', 'check_circle_outline');
                } else {
                    content = `<div class="space-y-4 animate-fade-in">` + pendingItems.map(item => `
                        <div class="bg-white p-5 rounded-[1.5rem] shadow-[0_4px_20px_rgb(0,0,0,0.03)] border border-slate-100 transition-all">
                            <div class="flex justify-between items-start mb-4">
                                <div class="pr-2">
                                    <h3 class="font-bold text-slate-800 text-[16px] leading-snug">${item.itemName}</h3>
                                    <span class="text-[10px] text-slate-400 font-mono tracking-wider mt-1 block">ID: ${item.id}</span>
                                </div>
                                <div class="flex-shrink-0">${getStatusBadge(item.status)}</div>
                            </div>
                            
                            <div class="bg-blue-50/50 rounded-2xl p-4 mb-4 flex justify-between items-center border border-blue-50">
                                <div>
                                    <p class="text-[10px] font-semibold text-blue-500 uppercase tracking-wider mb-0.5">ยอดเบิก</p>
                                    <p class="font-bold text-blue-700 text-lg">${item.requestQty} <span class="text-xs font-medium text-blue-400">ชิ้น</span></p>
                                </div>
                                <div class="text-right">
                                    <p class="text-[10px] font-semibold text-slate-400 uppercase tracking-wider mb-0.5">เวลาเบิก</p>
                                    <p class="text-xs text-slate-700 font-medium">${item.timestamp.split(' / ')[1] || '-'}</p>
                                    <p class="text-[10px] text-slate-400">${item.timestamp.split(' / ')[0] || '-'}</p>
                                </div>
                            </div>

                            ${item.w2Note ? `<p class="text-xs mb-4 text-amber-700 bg-amber-50 p-3 rounded-xl border border-amber-100 flex items-start gap-2"><span class="material-icons-round text-[16px] mt-px">info</span> <span>${item.w2Note}</span></p>` : ''}

                            ${item.status === 'สั่งเบิก' ? `
                                <div class="flex justify-end">
                                    <button onclick="if(confirm('ต้องการยกเลิกรายการเบิกนี้ใช่หรือไม่?')) updateItemStatus('${item.id}', 'ยกเลิกรายการ')" class="text-[11px] font-semibold tracking-wide text-rose-500 hover:bg-rose-50 px-3 py-1.5 rounded-full flex items-center gap-1 transition-colors">
                                        ยกเลิกการเบิก
                                    </button>
                                </div>
                            ` : ''}

                            ${item.status === 'รอรับสินค้า' && state.selectedReceiveId !== item.id ? `
                                <button onclick="openReceiveForm('${item.id}')" class="w-full bg-emerald-500 text-white font-medium text-sm py-3.5 rounded-xl hover:bg-emerald-600 active:scale-[0.98] transition-all shadow-[0_4px_12px_rgba(16,185,129,0.2)]">
                                    เช็คและรับสินค้า
                                </button>
                            ` : ''}

                            ${state.selectedReceiveId === item.id ? `
                                <form onsubmit="handleReceiveSubmit(event, '${item.id}', ${item.requestQty})" class="mt-2 pt-4 border-t border-slate-100 animate-fade-in">
                                    <h4 class="font-bold text-emerald-700 text-sm mb-4 flex items-center justify-center gap-2"><span class="material-icons-round text-[18px]">verified</span> ฟอร์มตรวจรับ</h4>
                                    <div class="space-y-4">
                                        <div>
                                            <label class="block text-[11px] font-semibold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">รับจริง (ชิ้น)</label>
                                            <input type="number" id="recv-qty-${item.id}" required min="0" value="${item.requestQty}" class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 text-center text-lg font-bold text-emerald-700 transition-all">
                                            <p class="text-[10px] text-slate-400 mt-1 ml-1">* หากได้ไม่ตรงยอด ระบบจะบันทึกหมายเหตุให้อัตโนมัติ</p>
                                        </div>
                                        <div>
                                            <label class="block text-[11px] font-semibold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">วันหมดอายุใหม่ <span class="text-rose-500">*</span></label>
                                            <input type="text" id="recv-exp-${item.id}" required class="w-full p-3.5 bg-slate-50 border border-transparent rounded-xl focus:bg-white focus:border-emerald-400 focus:ring-4 focus:ring-emerald-50 text-sm transition-all" placeholder="วว-ดด-ปป">
                                        </div>
                                        <div class="flex gap-3 pt-2">
                                            <button type="button" onclick="openReceiveForm(null)" class="flex-1 bg-white border border-slate-200 text-slate-500 py-3.5 rounded-xl font-medium text-sm transition-colors hover:bg-slate-50">ยกเลิก</button>
                                            <button type="submit" class="flex-[2] bg-emerald-600 text-white py-3.5 rounded-xl font-medium text-sm shadow-[0_4px_12px_rgba(5,150,105,0.2)] active:scale-[0.98] transition-all">ยืนยันรับของ</button>
                                        </div>
                                    </div>
                                </form>
                            ` : ''}
                        </div>
                    `).join('') + `</div>`;
                }
            } else if (state.w1Tab === 'history') {
                content = renderHistoryList('w1');
            }

            return `
                <div class="w-full max-w-md bg-[#f8fafc] min-h-screen flex flex-col relative">
                    <!-- Header -->
                    <header class="bg-blue-600 text-white p-4 flex justify-between items-center sticky top-0 z-20 shadow-md">
                        <div class="flex items-center gap-2">
                            <button onclick="setView('home')" class="p-1.5 rounded-full hover:bg-blue-700 transition-colors text-white">
                                <span class="material-icons-round">arrow_back</span>
                            </button>
                            <h1 class="text-[17px] font-bold tracking-wide flex items-center gap-1.5"><span class="material-icons-round text-[20px]">storefront</span> หน้าร้าน W1</h1>
                        </div>
                        <div class="text-[10px] font-semibold tracking-wide bg-blue-700/50 text-blue-50 px-3 py-1.5 rounded-full flex items-center gap-1.5 border border-blue-500/30">
                            <span class="material-icons-round text-[14px]">account_circle</span>
                            ${currentUser || 'Demo'}
                        </div>
                    </header>

                    <!-- Tabs -->
                    <div class="flex bg-white shadow-sm sticky top-[60px] z-10 border-b border-slate-100 px-2">
                        <button onclick="setW1Tab('request')" class="flex-1 py-3.5 text-[13px] font-semibold border-b-[2px] transition-all ${state.w1Tab === 'request' ? 'border-blue-600 text-blue-600' : 'border-transparent text-slate-400 hover:text-slate-600'}">เบิกสินค้า</button>
                        <button onclick="setW1Tab('pending')" class="flex-1 py-3.5 text-[13px] font-semibold border-b-[2px] relative transition-all ${state.w1Tab === 'pending' ? 'border-blue-600 text-blue-600' : 'border-transparent text-slate-400 hover:text-slate-600'}">
                            รอรับ
                            ${hasPending ? `<span class="absolute top-3.5 right-4 w-1.5 h-1.5 rounded-full bg-rose-500 ring-2 ring-white"></span>` : ''}
                        </button>
                        <button onclick="setW1Tab('history')" class="flex-1 py-3.5 text-[13px] font-semibold border-b-[2px] transition-all ${state.w1Tab === 'history' ? 'border-blue-600 text-blue-600' : 'border-transparent text-slate-400 hover:text-slate-600'}">ประวัติ</button>
                    </div>

                    <!-- Main Content -->
                    <main class="flex-1 overflow-y-auto p-5 pb-24">
                        ${content}
                    </main>
                </div>
            `;
        }

        function renderW2() {
            const hasTasks = state.items.some(i => ['สั่งเบิก', 'กำลังจัดสินค้า'].includes(i.status));
            
            let content = '';
            if (state.w2Tab === 'tasks') {
                const activeTasks = state.items.filter(i => ['สั่งเบิก', 'กำลังจัดสินค้า'].includes(i.status));
                if (activeTasks.length === 0) {
                    content = renderEmptyState('ไม่มีงานจัดสินค้า', 'inventory_2');
                } else {
                    content = `<div class="space-y-4 animate-fade-in">` + activeTasks.map(item => `
                        <div class="bg-white p-5 rounded-[1.5rem] shadow-[0_4px_20px_rgb(0,0,0,0.03)] border border-slate-100 ${item.status === 'กำลังจัดสินค้า' ? 'border-l-[4px] border-l-indigo-500' : ''}">
                            <div class="flex justify-between items-start mb-4">
                                <div class="pr-2">
                                    <h3 class="font-bold text-slate-800 text-[16px] leading-snug">${item.itemName}</h3>
                                    <span class="text-[10px] text-slate-400 font-mono tracking-wider mt-1 block">ID: ${item.id}</span>
                                </div>
                                <div class="flex-shrink-0">${getStatusBadge(item.status)}</div>
                            </div>
                            
                            <div class="bg-indigo-50/50 rounded-2xl p-4 mb-4 flex justify-between items-center border border-indigo-50">
                                <div>
                                    <p class="text-[10px] font-semibold text-indigo-400 uppercase tracking-wider mb-0.5">ยอดสั่งเบิก</p>
                                    <p class="font-bold text-indigo-700 text-lg">${item.requestQty} <span class="text-xs font-medium text-indigo-400">ชิ้น</span></p>
                                </div>
                                <div class="text-right">
                                    <p class="text-[10px] font-semibold text-slate-400 uppercase tracking-wider mb-0.5">หมดอายุเก่า</p>
                                    <p class="text-xs text-slate-700 font-medium">${item.oldExpiry}</p>
                                </div>
                            </div>
                            
                            <div class="mb-5">
                                <label class="block text-[11px] font-semibold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">โน้ตแจ้งหน้าร้าน <span class="text-[10px] font-normal normal-case text-slate-400">(ถ้ามี)</span></label>
                                <input type="text" id="w2-note-${item.id}" value="${item.w2Note || ''}" class="w-full p-3.5 bg-slate-50 border border-transparent rounded-xl focus:bg-white focus:border-indigo-400 focus:ring-4 focus:ring-indigo-50 transition-all text-sm text-slate-800 placeholder:text-slate-300" placeholder="เช่น ของได้แค่ 5 ชิ้น...">
                            </div>

                            ${item.status === 'สั่งเบิก' ? `
                                <div class="flex gap-2">
                                    <button onclick="if(confirm('ยืนยันแจ้งสินค้าหมด?')) updateItemStatus('${item.id}', 'สินค้าหมด')" class="flex-1 py-3.5 bg-white border border-slate-200 text-rose-500 text-sm font-medium rounded-xl hover:bg-rose-50 transition-colors">แจ้งหมด</button>
                                    <button onclick="updateItemStatus('${item.id}', 'กำลังจัดสินค้า')" class="flex-[2] py-3.5 bg-indigo-600 text-white font-medium text-sm rounded-xl shadow-[0_4px_12px_rgba(79,70,229,0.25)] active:scale-[0.98] transition-all">เริ่มจัดของ</button>
                                </div>
                            ` : ''}

                            ${item.status === 'กำลังจัดสินค้า' ? `
                                <div class="flex flex-col gap-2">
                                    <button onclick="updateItemStatus('${item.id}', 'รอรับสินค้า')" class="w-full py-4 bg-orange-500 text-white font-medium rounded-xl shadow-[0_4px_12px_rgba(249,115,22,0.25)] flex justify-center items-center gap-2 text-sm active:scale-[0.98] transition-all">
                                        จัดเสร็จแล้ว ส่งไปหน้าร้าน <span class="material-icons-round text-[18px]">east</span>
                                    </button>
                                    <div class="flex gap-2 mt-1">
                                        <button onclick="if(confirm('ยืนยันแจ้งสินค้าหมด?')) updateItemStatus('${item.id}', 'สินค้าหมด')" class="flex-1 py-2 text-[11px] font-semibold tracking-wide text-rose-500 hover:bg-rose-50 rounded-lg transition-colors">แจ้งของหมด</button>
                                        <button onclick="if(confirm('ต้องการยกเลิกรายการนี้?')) updateItemStatus('${item.id}', 'ยกเลิกรายการ')" class="flex-1 py-2 text-[11px] font-semibold tracking-wide text-slate-400 hover:bg-slate-100 rounded-lg transition-colors">ยกเลิกรายการ</button>
                                    </div>
                                </div>
                            ` : ''}
                        </div>
                    `).join('') + `</div>`;
                }
            } else if (state.w2Tab === 'history') {
                content = renderHistoryList('w2');
            }

            return `
                <div class="w-full max-w-md bg-[#f8fafc] min-h-screen flex flex-col relative">
                    <!-- Header -->
                    <header class="bg-indigo-600 text-white p-4 flex justify-between items-center sticky top-0 z-20 shadow-md">
                        <div class="flex items-center gap-2">
                            <button onclick="setView('home')" class="p-1.5 rounded-full hover:bg-indigo-700 transition-colors text-white">
                                <span class="material-icons-round">arrow_back</span>
                            </button>
                            <h1 class="text-[17px] font-bold tracking-wide flex items-center gap-1.5"><span class="material-icons-round text-[20px]">warehouse</span> คลังสินค้า W2</h1>
                        </div>
                        <div class="text-[10px] font-semibold tracking-wide bg-indigo-700/50 text-indigo-50 px-3 py-1.5 rounded-full flex items-center gap-1.5 border border-indigo-500/30">
                            <span class="material-icons-round text-[14px]">account_circle</span>
                            ${currentUser || 'Demo'}
                        </div>
                    </header>

                    <!-- Tabs -->
                    <div class="flex bg-white shadow-sm sticky top-[60px] z-10 border-b border-slate-100 px-2">
                        <button onclick="setW2Tab('tasks')" class="flex-1 py-3.5 text-[13px] font-semibold border-b-[2px] relative transition-all ${state.w2Tab === 'tasks' ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-slate-400 hover:text-slate-600'}">
                            งานจัด
                            ${hasTasks ? `<span class="absolute top-3.5 right-4 w-1.5 h-1.5 rounded-full bg-rose-500 ring-2 ring-white"></span>` : ''}
                        </button>
                        <button onclick="setW2Tab('history')" class="flex-1 py-3.5 text-[13px] font-semibold border-b-[2px] transition-all ${state.w2Tab === 'history' ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-slate-400 hover:text-slate-600'}">ประวัติ</button>
                    </div>

                    <!-- Main Content -->
                    <main class="flex-1 overflow-y-auto p-5 pb-24">
                        ${content}
                    </main>
                </div>
            `;
        }

        // Main Render Function
        function render() {
            const root = document.getElementById('app-root');
            if (state.view === 'home') {
                root.innerHTML = renderHome();
            } else if (state.view === 'w1') {
                root.innerHTML = renderW1();
            } else if (state.view === 'w2') {
                root.innerHTML = renderW2();
            }
        }

        // ==========================================
        // 6. INITIALIZATION
        // ==========================================
        window.onload = function() {
            // โค้ดสำหรับดักจับว่ามีผู้ใช้เข้าระบบหรือยัง จะทำงานจากด้านบน (บรรทัดที่ 46) อยู่แล้ว
            if(currentUser) {
                showLoading('กำลังโหลดข้อมูลเบิกจ่าย...');
                fetchInitialData();
            }
        };

    </script>
</body>
</html>
