<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบเบิกจ่ายสินค้า TRD-AKRA</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Custom Styles & Animations */
        body { 
            font-family: 'Sarabun', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            background-color: #f8fafc; /* slate-50 */
            color: #1e293b; /* slate-800 */
        }
        .animate-fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Hide scrollbar for cleaner look */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* Loading Overlay */
        #loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(4px);
            z-index: 9999;
            align-items: center; justify-content: center; flex-direction: column;
        }
        
        /* Smooth transitions for inputs */
        input, button { transition: all 0.2s ease-in-out; }
    </style>
</head>
<body class="bg-[#f8fafc]">

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="flex">
        <div class="animate-spin rounded-full h-10 w-10 border-[3px] border-teal-100 border-t-teal-600 mb-4"></div>
        <p class="text-teal-600 font-medium text-sm tracking-wide" id="loading-text">กำลังโหลดข้อมูล...</p>
    </div>

    <div id="app-root" class="min-h-screen flex justify-center">
        <!-- Content will be injected here by JavaScript -->
    </div>

    <script>
        // ==========================================
        // 0. AUTHENTICATION & LOG SYSTEM
        // ==========================================
        const CURRENT_APP_NAME = "TRDAKRA"; 
        const GOOGLE_APP_SCRIPT_URL_LOG = "https://script.google.com/macros/s/AKfycbw5PCJ1OlxCQR6zaNubrmZTgaORB-rJK2Ow5_YC3i5kKv-BrrTgJkTJyNZKrzfodK1m/exec";

        const urlParams = new URLSearchParams(window.location.search);
        let currentUser = urlParams.get('user');

        if (currentUser) {
            sessionStorage.setItem('active_user', currentUser);
            try { window.history.replaceState({}, document.title, window.location.pathname); } catch(e) {}
        } else {
            currentUser = sessionStorage.getItem('active_user');
        }

        if (!currentUser) {
            if (window.self !== window.top || window.location.hostname.includes('usercontent') || window.location.hostname.includes('127.0.0.1')) {
                currentUser = "พนักงาน (Preview)";
            } else {
                alert("กรุณาเข้าสู่ระบบผ่านหน้า Main ก่อนใช้งานครับ");
                try { window.location.href = "https://akra-web.github.io/Main/"; } catch(e) {}
            }
        } 
        
        function sendAppLog(action, details) {
            const payload = { user: currentUser, action: action, app: CURRENT_APP_NAME, details: details };
            fetch(GOOGLE_APP_SCRIPT_URL_LOG, {
                method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
            }).then(() => { console.log(`บันทึก Log สำเร็จ: ${action}`); }).catch(err => console.error(err));
        }

        // ==========================================
        // 1. CONFIGURATION & STATE
        // ==========================================
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby_VL9BXR4JOPvrvWtEoKWyM_FlN5SeNdiZhYpUoeAcC7K2_aSzDJ4RlxPgd-e8RpP4Aw/exec';

        let state = {
            view: 'home', 
            w1Tab: 'request', 
            w2Tab: 'tasks', 
            dashboardFilter: 'week', 
            selectedReceiveId: null, 
            items: [], 
            products: [] 
        };

        function showLoading(text = 'กำลังทำงาน...') {
            document.getElementById('loading-text').innerText = text;
            document.getElementById('loading-overlay').style.display = 'flex';
        }

        function hideLoading() { document.getElementById('loading-overlay').style.display = 'none'; }

        // ==========================================
        // 2. API FUNCTIONS (FETCH) & DATE FORMATTERS
        // ==========================================
        function formatDateTime(dateStr) {
            if (!dateStr) return '-';
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) return dateStr;

            const optionsDate = { timeZone: 'Asia/Bangkok', day: '2-digit', month: '2-digit', year: 'numeric' };
            const optionsTime = { timeZone: 'Asia/Bangkok', hour: '2-digit', minute: '2-digit', hour12: false };
            
            let datePart = d.toLocaleDateString('th-TH', optionsDate).replace(/\//g, '-'); 
            let timePart = d.toLocaleTimeString('th-TH', optionsTime);

            return `${datePart} / ${timePart} น.`;
        }

        function convertToCE(dateStr) {
            if (!dateStr) return dateStr;
            const regex = /^(\d{1,2})[-/](\d{1,2})[-/](\d{4})$/;
            const match = dateStr.trim().match(regex);
            if (match) {
                let day = match[1].padStart(2, '0');
                let month = match[2].padStart(2, '0');
                let year = parseInt(match[3], 10);
                if (year > 2500) year -= 543;
                return `${day}-${month}-${year}`; 
            }
            return dateStr; 
        }

        function formatExpiryDate(val) {
            if (!val || val === 'ไม่ได้ระบุ') return val;
            if (typeof val === 'string' && val.match(/^\d{4}-\d{2}-\d{2}T/)) {
                const d = new Date(val);
                if (!isNaN(d.getTime())) {
                    return `${String(d.getDate()).padStart(2, '0')}-${String(d.getMonth() + 1).padStart(2, '0')}-${d.getFullYear() + 543}`;
                }
            }
            if (typeof val === 'string') {
                const regex = /^(\d{1,2})[-/](\d{1,2})[-/](\d{4})$/;
                const match = val.trim().match(regex);
                if (match) {
                    let year = parseInt(match[3], 10);
                    if (year > 1900 && year < 2500) year += 543;
                    return `${match[1].padStart(2, '0')}-${match[2].padStart(2, '0')}-${year}`;
                }
            }
            return val;
        }

        function parseCustomDate(dateStr) {
            if (!dateStr) return new Date(0);
            const isoTry = new Date(dateStr);
            if (!isNaN(isoTry.getTime()) && String(dateStr).includes('T')) return isoTry;

            try {
                const parts = String(dateStr).split('/');
                if (parts.length >= 1) {
                    const dSplit = parts[0].trim().split('-');
                    if (dSplit.length === 3) {
                        const day = parseInt(dSplit[0], 10);
                        const month = parseInt(dSplit[1], 10) - 1;
                        let year = parseInt(dSplit[2], 10);
                        if (year > 2500) year -= 543; 

                        let hrs = 0, mins = 0;
                        if (parts.length > 1) {
                            const tSplit = parts[1].replace('น.', '').trim().split(':');
                            if (tSplit.length >= 2) { 
                                hrs = parseInt(tSplit[0], 10); 
                                mins = parseInt(tSplit[1], 10); 
                            }
                        }
                        const pDate = new Date(year, month, day, hrs, mins);
                        if (!isNaN(pDate.getTime())) return pDate;
                    }
                }
            } catch(e) {}
            return new Date();
        }

        async function fetchInitialData(isRefresh = false) {
            if (!APPS_SCRIPT_URL) { hideLoading(); alert('กรุณาใส่ APPS_SCRIPT_URL ก่อนใช้งาน'); return; }
            if(isRefresh) showLoading('กำลังรีเฟรชข้อมูล...');

            try {
                const itemsResponse = await fetch(`${APPS_SCRIPT_URL}?action=getItems`);
                const itemsData = await itemsResponse.json();
                
                state.items = (itemsData || []).map(item => {
                    return {
                        ...item,
                        rawDate: parseCustomDate(item.timestamp), 
                        timestamp: String(item.timestamp).includes('/') ? item.timestamp : formatDateTime(item.timestamp),
                        oldExpiry: formatExpiryDate(item.oldExpiry),
                        newExpiry: formatExpiryDate(item.newExpiry),
                        storageCapacity: parseInt(item.currentStock || item.storageCapacity) || 0 // จัดการค่าความจุหน้าร้าน
                    };
                });

                const productsResponse = await fetch(`${APPS_SCRIPT_URL}?action=getProducts`);
                const productsData = await productsResponse.json();
                
                if (Array.isArray(productsData)) {
                    state.products = productsData.map(p => {
                        if (typeof p === 'object' && p !== null) return p.itemName || p.name || p[0] || p[1] || '';
                        return String(p).trim();
                    }).filter(p => p !== '');
                } else { state.products = []; }

                render();
            } catch (error) {
                console.error('Error fetching data:', error);
                alert('ไม่สามารถเชื่อมต่อกับฐานข้อมูลได้ กรุณาลองใหม่อีกครั้ง');
            } finally { hideLoading(); }
        }

        async function syncDataToSheet() {
            if (!APPS_SCRIPT_URL) return;
            showLoading('กำลังบันทึกข้อมูล...');
            try {
                const itemsToSave = state.items.map(({rawDate, ...rest}) => rest);
                await fetch(APPS_SCRIPT_URL, {
                    method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(itemsToSave)
                });
            } catch (error) {
                console.error('Error saving data:', error); alert('เกิดข้อผิดพลาดในการบันทึกข้อมูล');
            } finally { hideLoading(); }
        }

        // ==========================================
        // 3. AUTOCOMPLETE SEARCH LOGIC
        // ==========================================
        function filterProducts(query) {
            const listDiv = document.getElementById('autocomplete-list');
            if (!listDiv) return;

            const q = query.toLowerCase().trim();
            let filtered = !q ? state.products.slice(0, 50) : state.products.filter(p => p.toLowerCase().includes(q)).slice(0, 50);

            if (filtered.length === 0) {
                listDiv.innerHTML = state.products.length === 0 ? 
                    `<div class="p-5 text-center"><span class="material-icons-round text-rose-300 text-3xl mb-2">error_outline</span><p class="text-sm font-semibold text-rose-500">ไม่พบฐานข้อมูลสินค้า</p></div>` : 
                    `<div class="p-4 text-sm text-slate-400 text-center">ไม่พบสินค้าที่ค้นหา</div>`;
            } else {
                listDiv.innerHTML = filtered.map(p => `
                    <div onclick="selectProduct(decodeURIComponent('${encodeURIComponent(p)}'))" 
                         class="px-4 py-3 hover:bg-blue-50 hover:text-blue-700 cursor-pointer border-b border-slate-50 text-sm text-slate-700 last:border-0 truncate flex items-center gap-3 transition-colors">
                        <span class="material-icons-round text-blue-300 text-[18px]">inventory_2</span> ${p}
                    </div>
                `).join('');
            }
            listDiv.classList.remove('hidden');
        }

        function selectProduct(name) {
            const input = document.getElementById('w1-itemName');
            if (input) input.value = name;
            document.getElementById('autocomplete-list').classList.add('hidden');
        }

        // ==========================================
        // 4. ACTION HANDLERS
        // ==========================================
        function setView(viewName) { state.view = viewName; state.selectedReceiveId = null; render(); }
        function setW1Tab(tabName) { state.w1Tab = tabName; state.selectedReceiveId = null; render(); }
        function setW2Tab(tabName) { state.w2Tab = tabName; state.selectedReceiveId = null; render(); }
        function setDashboardFilter(val) { state.dashboardFilter = val; render(); }

        async function handleW1Submit(event) {
            event.preventDefault();
            const itemName = document.getElementById('w1-itemName').value;
            const qty = document.getElementById('w1-qty').value;
            const storageCapacity = document.getElementById('w1-storageCapacity').value; // ความจุหน้าร้าน
            const oldExpiryInput = document.getElementById('w1-oldExpiry').value;

            if (!itemName || !qty) return;

            const now = new Date();
            const newItem = {
                id: `REQ-${Math.floor(Math.random() * 9000) + 1000}`,
                rawDate: now,
                timestamp: formatDateTime(now.toISOString()),
                itemName: itemName,
                requestQty: parseInt(qty),
                storageCapacity: storageCapacity ? parseInt(storageCapacity) : 0, // บันทึกค่าความจุ
                status: 'สั่งเบิก',
                oldExpiry: oldExpiryInput ? convertToCE(oldExpiryInput) : 'ไม่ได้ระบุ',
                newExpiry: '', receiveQty: null, receiveNote: '', w2Note: '' 
            };

            state.items.unshift(newItem); 
            state.w1Tab = 'pending'; 
            render(); 
            
            await syncDataToSheet(); 
            alert('ส่งคำขอเบิกสินค้าเรียบร้อยแล้ว!');
            sendAppLog("สั่งเบิกสินค้า (TRD)", `เบิก: ${itemName} จำนวน ${qty} ชิ้น (ความจุ: ${storageCapacity})`);
        }

        function openReceiveForm(id) { state.selectedReceiveId = id; render(); }

        async function handleDispatchSubmit(event, id, reqQty) {
            event.preventDefault();
            const dispatchQty = parseInt(document.getElementById(`disp-qty-${id}`).value);
            const newExpiryInput = document.getElementById(`disp-exp-${id}`).value;
            const noteInput = document.getElementById(`w2-note-${id}`);
            const w2NoteValue = noteInput ? noteInput.value : '';
            
            const newExpiry = newExpiryInput ? convertToCE(newExpiryInput) : 'ไม่ได้ระบุ';

            let note = 'ครบ';
            if (dispatchQty < reqQty) note = `ขาด ${reqQty - dispatchQty}`;
            if (dispatchQty > reqQty) note = `เกิน ${dispatchQty - reqQty}`;

            let dispatchedItemName = "";

            state.items = state.items.map(item => {
                if (item.id === id) {
                    dispatchedItemName = item.itemName;
                    return { ...item, status: 'จัดส่งแล้ว', receiveQty: dispatchQty, receiveNote: note, newExpiry: newExpiry, w2Note: w2NoteValue || item.w2Note };
                }
                return item;
            });

            state.selectedReceiveId = null;
            render();
            await syncDataToSheet();
            sendAppLog("จัดส่งสินค้า (AKRA)", `จัดส่ง: ${dispatchedItemName} ยอด ${dispatchQty} (${note})`);
        }

        async function updateItemStatus(id, newStatus) {
            const noteInput = document.getElementById(`w2-note-${id}`);
            const w2NoteValue = noteInput ? noteInput.value : '';
            let targetItemName = "";

            state.items = state.items.map(item => {
                if (item.id === id) {
                    targetItemName = item.itemName;
                    return { ...item, status: newStatus, w2Note: w2NoteValue || item.w2Note };
                }
                return item;
            });
            render();
            await syncDataToSheet();
            sendAppLog("เปลี่ยนสถานะ (AKRA)", `สถานะ: ${newStatus} (${targetItemName}) หมายเหตุ: ${w2NoteValue}`);
        }

        // ==========================================
        // 5. UI RENDERING LOGIC
        // ==========================================
        function getStatusBadge(status) {
            const styles = {
                'สั่งเบิก': 'bg-blue-50 text-blue-700 border-blue-200/60',
                'กำลังจัดสินค้า': 'bg-indigo-600 text-white shadow-sm shadow-indigo-600/30',
                'จัดส่งแล้ว': 'bg-emerald-50 text-emerald-700 border-emerald-200/60',
                'สินค้าหมด': 'bg-rose-50 text-rose-700 border-rose-200/60',
                'ยกเลิกรายการ': 'bg-slate-50 text-slate-400 border-slate-200'
            };
            return `<span class="px-2.5 py-1 rounded-full text-[10px] font-bold tracking-wide uppercase border ${styles[status] || 'bg-slate-100'}">${status}</span>`;
        }

        function renderEmptyState(message, iconName) {
            return `<div class="flex flex-col items-center justify-center py-16 text-slate-400">
                    <div class="bg-white p-4 rounded-full shadow-sm mb-3 text-slate-300"><span class="material-icons-round" style="font-size: 40px;">${iconName}</span></div>
                    <p class="text-sm font-medium tracking-wide">${message}</p>
                </div>`;
        }

        function renderHistoryList(role) {
            const historyItems = state.items.filter(i => ['จัดส่งแล้ว', 'สินค้าหมด', 'ยกเลิกรายการ'].includes(i.status));
            if (historyItems.length === 0) return renderEmptyState('ไม่มีประวัติย้อนหลัง', 'history_toggle_off');

            return `<div class="space-y-4">
                ${historyItems.map(item => `
                    <div class="bg-white p-5 rounded-[1.5rem] shadow-[0_4px_16px_rgb(0,0,0,0.03)] border border-slate-100 opacity-95 hover:opacity-100 transition-opacity">
                        <div class="flex justify-between items-start mb-3">
                            <div class="pr-2">
                                <h3 class="font-bold text-slate-800 text-[15px] leading-tight">${item.itemName}</h3>
                                <p class="text-[10px] text-slate-400 font-mono tracking-wider mt-1">ID: ${item.id}</p>
                            </div>
                            <div class="flex-shrink-0">${getStatusBadge(item.status)}</div>
                        </div>
                        <div class="flex justify-between items-end border-t border-slate-50 pt-3 mt-1">
                            <div class="text-xs text-slate-500 space-y-1">
                                <p class="text-[10px] text-slate-400 flex items-center gap-1"><span class="material-icons-round text-[12px]">schedule</span> ${item.timestamp}</p>
                                ${item.status === 'จัดส่งแล้ว' ? `
                                    <p class="mt-1">เบิก <span class="font-medium text-slate-700">${item.requestQty}</span> (ความจุ ${item.storageCapacity || 0}) • ส่งจริง <span class="font-medium text-emerald-600">${item.receiveQty}</span></p>
                                    ${role === 'w1' ? `<p class="text-[11px] text-blue-500 font-medium">EXP ใหม่: ${item.newExpiry}</p>` : ''}
                                ` : ''}
                            </div>
                            ${item.status === 'จัดส่งแล้ว' && item.receiveNote && item.receiveNote !== 'ครบ' ? `<div class="text-[10px] font-medium text-rose-500 bg-rose-50 px-2 py-0.5 rounded-md border border-rose-100/50">จัดส่ง${item.receiveNote}</div>` : ''}
                        </div>
                        ${item.w2Note ? `<p class="text-[11px] mt-3 text-amber-700 bg-amber-50 px-3 py-2 rounded-xl border border-amber-100/50"><span class="font-bold">โน้ต:</span> ${item.w2Note}</p>` : ''}
                    </div>
                `).join('')}</div>`;
        }

        // --- Render Dashboard (สถิติวิเคราะห์เชิงลึก AI) ---
        function getInsightDetails(itemName, qty, count, capacity) {
            const avgQty = Math.round(qty / count);
            const maxCapacity = capacity || 30; // ใช้ความจุที่พนักงานเคยกรอก (ถ้าไม่เคยกรอกใช้ 30 เป็นค่าเริ่มต้น)

            // 1. ขายไวมาก/พื้นที่น้อยไป (เบิกรวมมากกว่าความจุเยอะมาก)
            if (count >= 3 && qty >= maxCapacity * 1.5) {
                return { 
                    icon: 'local_fire_department', 
                    title: 'ขายไว / ควรขยายพื้นที่', 
                    desc: `ความจุหน้าร้านเก็บได้ ${maxCapacity} ชิ้น แต่เบิกรวมไปถึง ${qty} ชิ้น (ออกบ่อย ${count} รอบ) สินค้าหมดเชลฟ์ไวมาก แนะนำขยายพื้นที่จัดเก็บ`,
                    color: 'text-rose-600', bg: 'bg-rose-50', border: 'border-rose-100'
                };
            }

            // 2. เบิกล็อตใหญ่/เกินความจุ (เบิกแต่ละทีเยอะกว่าที่เก็บได้)
            if (avgQty > maxCapacity) {
                return {
                    icon: 'shopping_cart', 
                    title: 'เบิกเกินความจุ (Overstock)', 
                    desc: `เบิกเฉลี่ย ${avgQty} ชิ้น/บิล ซึ่งล้นความจุหน้าร้าน (${maxCapacity} ชิ้น) อาจมีโปรโมชั่นหรือจัดพื้นที่สต๊อคนอกเชลฟ์`,
                    color: 'text-indigo-600', bg: 'bg-indigo-50', border: 'border-indigo-100'
                };
            }

            // 3. ทยอยเติม (พื้นที่จำกัด)
            if (count >= 3 && avgQty <= maxCapacity / 2) {
                return { 
                    icon: 'inventory_2', 
                    title: 'ทยอยเติม (ตามพื้นที่)', 
                    desc: `เบิกบ่อย ${count} บิล ทีละ ${avgQty} ชิ้น (เต็มความจุ ${maxCapacity} ชิ้น) พนักงานต้องคอยเติมเรื่อยๆ เป็นการเบิกตามพื้นที่วางโชว์`,
                    color: 'text-amber-600', bg: 'bg-amber-50', border: 'border-amber-100'
                };
            }

            // 4. การเบิกแบบสมดุล (Restock พอดี)
            if (qty >= maxCapacity * 0.5 && qty <= maxCapacity * 1.2) {
                return {
                    icon: 'store', 
                    title: 'เบิกเติมเต็ม (Restock)', 
                    desc: `เบิกรวม ${qty} ชิ้น ใกล้เคียงกับความจุหน้าร้าน (${maxCapacity} ชิ้น) เป็นการทยอยเติมและจัดการสต๊อคที่สมดุลดีมาก`,
                    color: 'text-blue-600', bg: 'bg-blue-50', border: 'border-blue-100'
                };
            }

            // 5. ค่าเริ่มต้น
            return { 
                icon: 'check_circle', 
                title: 'การเคลื่อนไหวปกติ', 
                desc: `ยอดเบิกเฉลี่ย ${avgQty} ชิ้น ความจุหน้าร้าน ${maxCapacity} ชิ้น อยู่ในระดับมาตรฐานการจัดการทั่วไป`,
                color: 'text-emerald-600', bg: 'bg-emerald-50', border: 'border-emerald-100'
            };
        }

        function renderDashboard() {
            const filter = state.dashboardFilter;
            const now = new Date();
            let startDate = new Date(now);

            if (filter === 'week') {
                const day = startDate.getDay();
                const diff = startDate.getDate() - day + (day === 0 ? -6 : 1); 
                startDate.setDate(diff);
                startDate.setHours(0,0,0,0);
            } else {

            }

            let totalQty = 0;
            let totalOrders = dispatchedItems.length;
            const itemStats = {};

                    itemStats[item.itemName] = { count: 0, qty: 0, capacity: 0 };

                itemStats[item.itemName].qty += qty;

                if(capacity > itemStats[item.itemName].capacity) {
                    itemStats[item.itemName].capacity = capacity;
                }
            });

                            ${state.selectedReceiveId !== item.id ? `
                                <div class="flex flex-col gap-2">
                                    <button onclick="openReceiveForm('${item.id}')" class="w-full py-4 bg-emerald-600 text-white font-medium rounded-xl shadow-[0_4px_12px_rgba(16,185,129,0.2)] flex justify-center items-center gap-2 text-sm active:scale-[0.98] transition-all hover:bg-emerald-700">จัดส่งสินค้า <span class="material-icons-round text-[18px]">local_shipping</span></button>
                                    <div class="flex gap-2 mt-1">
                                        <button onclick="if(confirm('ยืนยันแจ้งสินค้าหมด?')) updateItemStatus('${item.id}', 'สินค้าหมด')" class="flex-1 py-2 text-[11px] font-semibold tracking-wide text-rose-500 hover:bg-rose-50 rounded-lg transition-colors">แจ้งของหมด</button>
                                        <button onclick="if(confirm('ต้องการยกเลิกรายการนี้?')) updateItemStatus('${item.id}', 'ยกเลิกรายการ')" class="flex-1 py-2 text-[11px] font-semibold tracking-wide text-slate-400 hover:bg-slate-100 rounded-lg transition-colors">ยกเลิกรายการ</button>
                                    </div>
                                </div>
                            ` : `
                                <form onsubmit="handleDispatchSubmit(event, '${item.id}', ${item.requestQty})" class="mt-4 pt-4 border-t border-slate-100 animate-fade-in">
                                    <h4 class="font-bold text-emerald-700 text-sm mb-4 flex items-center justify-center gap-2"><span class="material-icons-round text-[18px]">inventory</span> ฟอร์มยืนยันการจัดส่ง</h4>
                                    <div class="space-y-4">
                                        <div><label class="block text-[11px] font-semibold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">ยอดจัดส่งจริง (ชิ้น)</label><input type="number" id="disp-qty-${item.id}" required min="0" value="${item.requestQty}" class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 text-center text-lg font-bold text-emerald-700 transition-all"></div>
                                        <div><label class="block text-[11px] font-semibold text-slate-500 uppercase tracking-wider mb-1.5 ml-1">วันหมดอายุใหม่</label><input type="text" id="disp-exp-${item.id}" class="w-full p-3.5 bg-slate-50 border border-transparent rounded-xl focus:bg-white focus:border-emerald-400 focus:ring-4 focus:ring-emerald-50 text-sm transition-all" placeholder="วว-ดด-ปป (ถ้ามี)"></div>
                                        <div class="flex gap-3 pt-2">
                                            <button type="button" onclick="openReceiveForm(null)" class="flex-1 bg-white border border-slate-200 text-slate-500 py-3.5 rounded-xl font-medium text-sm transition-colors hover:bg-slate-50">ยกเลิก</button>
                                            <button type="submit" class="flex-[2] bg-emerald-600 text-white py-3.5 rounded-xl font-medium text-sm shadow-[0_4px_12px_rgba(5,150,105,0.2)] active:scale-[0.98] transition-all">ยืนยันการส่ง</button>
                                        </div>
                                    </div>
                                </form>
                            `}
                        </div>
                    `).join('') + `</div>`;
                }
            } else if (state.w2Tab === 'history') { content = renderHistoryList('w2'); }

            return `
                <div class="w-full max-w-md bg-[#f8fafc] min-h-screen flex flex-col relative">
                    <header class="bg-indigo-600 text-white p-4 flex justify-between items-center sticky top-0 z-20 shadow-md">
                        <div class="flex items-center gap-2"><button onclick="setView('home')" class="p-1.5 rounded-full hover:bg-indigo-700 transition-colors text-white"><span class="material-icons-round">arrow_back</span></button><h1 class="text-[17px] font-bold tracking-wide flex items-center gap-1.5"><span class="material-icons-round text-[20px]">warehouse</span> AKRA (คลังสินค้า)</h1></div>
                        <div class="flex items-center gap-2">
                            <button onclick="fetchInitialData(true)" class="p-1.5 rounded-full hover:bg-indigo-700 transition-colors text-white" title="รีเฟรชข้อมูล"><span class="material-icons-round text-[20px]">refresh</span></button>
                            <div class="text-[10px] font-semibold tracking-wide bg-indigo-700/50 text-indigo-50 px-3 py-1.5 rounded-full flex items-center gap-1.5 border border-indigo-500/30"><span class="material-icons-round text-[14px]">account_circle</span> ${currentUser || 'Demo'}</div>
                        </div>
                    </header>
                    <div class="flex bg-white shadow-sm sticky top-[60px] z-10 border-b border-slate-100 px-2">
                        <button onclick="setW2Tab('tasks')" class="flex-1 py-3.5 text-[13px] font-semibold border-b-[2px] relative transition-all ${state.w2Tab === 'tasks' ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-slate-400 hover:text-slate-600'}">งานจัด ${hasTasks ? `<span class="absolute top-3.5 right-4 w-1.5 h-1.5 rounded-full bg-rose-500 ring-2 ring-white"></span>` : ''}</button>
                        <button onclick="setW2Tab('history')" class="flex-1 py-3.5 text-[13px] font-semibold border-b-[2px] transition-all ${state.w2Tab === 'history' ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-slate-400 hover:text-slate-600'}">ประวัติ</button>
                    </div>
                    <main class="flex-1 overflow-y-auto p-5 pb-24">${content}</main>
                </div>`;
        }

        // Main Render Function
        function render() {
            const root = document.getElementById('app-root');
            if (state.view === 'home') { root.innerHTML = renderHome(); } 
            else if (state.view === 'w1') { root.innerHTML = renderW1(); } 
            else if (state.view === 'w2') { root.innerHTML = renderW2(); }
            else if (state.view === 'dashboard') { root.innerHTML = renderDashboard(); }
        }

        // ==========================================
        // 6. INITIALIZATION
        // ==========================================
        window.onload = function() {
            if(currentUser) { showLoading('กำลังโหลดข้อมูลเบิกจ่าย...'); fetchInitialData(); }
        };

    </script>
</body>
</html>
